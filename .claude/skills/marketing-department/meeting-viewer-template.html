<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CPNT — Marketing Meeting</title>
<style>
:root {
  --bg: #0D0602; --surface: #160904; --surface2: #2B1408;
  --cream: #FDF8ED; --cream-dim: rgba(253,248,237,0.6); --cream-faint: rgba(253,248,237,0.1);
  --green: #3E6145; --green-light: #7BC47F;
  --orange: #C65C33; --orange-dim: rgba(198,92,51,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--cream); font-family:'Inter',-apple-system,sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

/* ── Header ── */
.hdr { background:var(--surface2); padding:14px 22px; border-bottom:1px solid var(--cream-faint); display:flex; align-items:center; gap:14px; flex-shrink:0; }
.hdr-logo { font-size:18px; font-weight:800; color:var(--orange); letter-spacing:-0.5px; }
.hdr-sep { color:rgba(253,248,237,0.15); }
.hdr-title { font-size:13px; color:var(--cream-dim); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hdr-badge { font-size:11px; padding:4px 11px; border-radius:20px; font-weight:600; border:1px solid; flex-shrink:0; }
.badge-idle  { background:rgba(107,143,191,0.15); color:#6B8FBF; border-color:#6B8FBF; }
.badge-live  { background:rgba(198,92,51,0.2);    color:var(--orange); border-color:var(--orange); }
.badge-done  { background:rgba(62,97,69,0.25);    color:var(--green-light); border-color:var(--green); }

/* ── Progress ── */
.prog { height:2px; background:rgba(253,248,237,0.06); flex-shrink:0; }
.prog-fill { height:100%; background:var(--orange); transition:width 0.4s ease; width:0%; }

/* ── Layout ── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── Sidebar ── */
.side { width:190px; background:var(--surface); padding:18px 12px; border-right:1px solid var(--cream-faint); flex-shrink:0; overflow-y:auto; display:flex; flex-direction:column; gap:20px; }
.side-section-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(253,248,237,0.25); margin-bottom:8px; }
.agent-card { display:flex; align-items:center; gap:9px; padding:9px 8px; border-radius:8px; transition:all 0.3s; opacity:0.35; }
.agent-card.active { opacity:1; background:rgba(255,255,255,0.04); }
.agent-card.speaking { opacity:1; background:rgba(255,255,255,0.07); box-shadow:0 0 0 1px currentColor; }
.av { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.agent-name { font-size:11px; font-weight:700; }
.agent-role { font-size:10px; color:rgba(253,248,237,0.35); margin-top:1px; }

.round-item { font-size:11px; padding:6px 8px; border-radius:6px; color:rgba(253,248,237,0.3); transition:all 0.3s; display:flex; align-items:center; gap:6px; }
.round-item.active { color:var(--cream); background:var(--orange-dim); }
.round-item.done { color:rgba(253,248,237,0.45); }
.round-dot { width:6px; height:6px; border-radius:50%; background:currentColor; flex-shrink:0; }

/* ── Content ── */
.content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.round-hdr { padding:12px 26px; border-bottom:1px solid var(--cream-faint); display:flex; align-items:center; gap:12px; flex-shrink:0; background:var(--surface); }
.round-badge { font-size:11px; padding:3px 10px; border-radius:20px; font-weight:700; letter-spacing:0.5px; }
.round-title { font-size:13px; color:var(--cream-dim); }

.msgs { flex:1; overflow-y:auto; padding:22px 26px; scroll-behavior:smooth; }
.msgs::-webkit-scrollbar { width:3px; }
.msgs::-webkit-scrollbar-thumb { background:rgba(253,248,237,0.12); border-radius:2px; }

/* ── Message ── */
.msg { display:flex; gap:14px; margin-bottom:26px; opacity:0; transform:translateY(6px); transition:opacity 0.35s, transform 0.35s; }
.msg.vis { opacity:1; transform:none; }
.msg-av { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; margin-top:2px; }
.msg-body { flex:1; }
.msg-hdr { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.msg-name { font-size:13px; font-weight:700; }
.msg-tag { font-size:10px; padding:2px 8px; border-radius:10px; background:rgba(255,255,255,0.07); color:rgba(253,248,237,0.45); letter-spacing:0.4px; }
.msg-txt { font-size:14px; line-height:1.75; color:rgba(253,248,237,0.82); white-space:pre-wrap; }

/* Strategic insight box */
.insight-box { background:rgba(107,143,191,0.08); border:1px solid rgba(107,143,191,0.25); border-radius:8px; padding:12px 14px; margin-top:10px; font-size:13px; line-height:1.6; color:rgba(253,248,237,0.75); }
.insight-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#6B8FBF; font-weight:700; margin-bottom:5px; }

/* ── Debate ── */
.debate { margin-bottom:26px; border:1px solid rgba(253,248,237,0.07); border-radius:12px; overflow:hidden; opacity:0; transform:translateY(6px); transition:opacity 0.35s, transform 0.35s; }
.debate.vis { opacity:1; transform:none; }
.debate-topic { background:rgba(198,92,51,0.1); padding:11px 16px; font-size:13px; font-weight:700; color:var(--orange); border-bottom:1px solid rgba(253,248,237,0.06); display:flex; align-items:center; gap:7px; }
.debate-body { padding:16px; }
.exchange { display:flex; gap:10px; margin-bottom:14px; }
.ex-av { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; margin-top:2px; }
.ex-name { font-size:11px; font-weight:700; margin-bottom:3px; }
.ex-txt { font-size:13px; line-height:1.65; color:rgba(253,248,237,0.78); }
.conclusion { margin-top:12px; padding:10px 13px; background:rgba(62,97,69,0.13); border-left:3px solid var(--green); border-radius:0 8px 8px 0; font-size:13px; color:rgba(253,248,237,0.72); }
.conclusion strong { color:var(--green-light); }

/* ── Summary ── */
.priority-card { background:var(--orange-dim); border:1px solid var(--orange); border-radius:10px; padding:16px 18px; margin-bottom:18px; display:flex; gap:12px; }
.priority-icon { font-size:22px; flex-shrink:0; }
.priority-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--orange); font-weight:700; margin-bottom:5px; }
.priority-text { font-size:15px; font-weight:600; line-height:1.5; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px; }
.card { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:14px; }
.card-title { font-size:10px; letter-spacing:1px; text-transform:uppercase; font-weight:700; margin-bottom:10px; }
.card-item { display:flex; gap:7px; font-size:13px; line-height:1.5; margin-bottom:7px; color:rgba(253,248,237,0.78); }

.matrix { grid-column:1/-1; }
.matrix-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px; }
.m-cell { padding:11px 12px; border-radius:8px; }
.m-label { font-size:10px; letter-spacing:0.8px; text-transform:uppercase; font-weight:700; margin-bottom:5px; }
.m-item { font-size:12px; color:rgba(253,248,237,0.72); margin-bottom:3px; }

.action-tbl { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:20px; }
.action-tbl th { text-align:left; padding:7px 11px; font-size:10px; letter-spacing:0.8px; text-transform:uppercase; color:rgba(253,248,237,0.35); border-bottom:1px solid rgba(253,248,237,0.07); }
.action-tbl td { padding:9px 11px; border-bottom:1px solid rgba(253,248,237,0.04); color:rgba(253,248,237,0.78); vertical-align:top; }

/* ── Controls ── */
.ctrl { padding:11px 26px; border-top:1px solid var(--cream-faint); display:flex; align-items:center; gap:10px; background:var(--surface); flex-shrink:0; }
.btn { padding:7px 14px; border-radius:7px; font-size:13px; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
.btn-primary { background:var(--orange); color:#fff; }
.btn-primary:hover:not(:disabled) { background:#d96b40; }
.btn-primary:disabled { opacity:0.4; cursor:default; }
.btn-ghost { background:transparent; color:var(--cream-dim); border:1px solid rgba(253,248,237,0.14); }
.btn-ghost:hover { background:rgba(255,255,255,0.04); color:var(--cream); }
.spd-label { font-size:12px; color:rgba(253,248,237,0.35); margin-left:auto; }
.spd-btn { padding:4px 10px; border-radius:6px; font-size:12px; cursor:pointer; background:transparent; border:1px solid rgba(253,248,237,0.14); color:var(--cream-dim); transition:all 0.2s; }
.spd-btn.on, .spd-btn:hover { background:rgba(255,255,255,0.07); color:var(--cream); }

/* typewriter cursor */
.cur { display:inline-block; width:2px; height:14px; background:var(--cream); margin-left:2px; vertical-align:middle; animation:blink 0.7s step-end infinite; }
@keyframes blink { 50%{opacity:0} }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">CPNT</div>
  <div class="hdr-sep">|</div>
  <div class="hdr-title" id="hdrTitle">Marketing Meeting</div>
  <div class="hdr-badge badge-idle" id="badge">⏳ Sẵn sàng</div>
</div>
<div class="prog"><div class="prog-fill" id="prog"></div></div>

<div class="main">
  <div class="side">
    <div>
      <div class="side-section-label">Thành viên</div>
      <div id="agentList"></div>
    </div>
    <div>
      <div class="side-section-label">Lịch trình</div>
      <div class="round-item" id="r1"><div class="round-dot"></div>Phát biểu</div>
      <div class="round-item" id="r2"><div class="round-dot"></div>Tranh luận</div>
      <div class="round-item" id="r3"><div class="round-dot"></div>Kết luận</div>
    </div>
  </div>

  <div class="content">
    <div class="round-hdr">
      <span class="round-badge" id="rBadge" style="background:rgba(107,143,191,0.15);color:#6B8FBF">CHUẨN BỊ</span>
      <span class="round-title" id="rTitle">Đọc brief và chuẩn bị thông tin...</span>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="ctrl">
      <button class="btn btn-primary" id="playBtn" onclick="togglePlay()">▶ Bắt đầu họp</button>
      <button class="btn btn-ghost" onclick="skip()">⏭ Xem ngay</button>
      <span class="spd-label">Tốc độ:</span>
      <button class="spd-btn on" onclick="setSpd(1,this)">1×</button>
      <button class="spd-btn"   onclick="setSpd(2,this)">2×</button>
      <button class="spd-btn"   onclick="setSpd(5,this)">5×</button>
    </div>
  </div>
</div>

<script>
// ─── DATA (injected by command) ───────────────────────────────────────────────
const M = MEETING_DATA_PLACEHOLDER;

// ─── AGENT PALETTE ───────────────────────────────────────────────────────────
const A = {
  'Creative Director': { icon:'🎨', color:'#C65C33', tag:'Brand & Concept' },
  'Copywriter':        { icon:'✍️',  color:'#3E6145', tag:'Copy & CTA' },
  'SEO Analyst':       { icon:'🔍', color:'#6B8FBF', tag:'Search & Traffic' },
  'Campaign Manager':  { icon:'📣', color:'#9B6B3A', tag:'Kênh & Ngân sách' },
  'Content Auditor':   { icon:'🔎', color:'#7B5EA7', tag:'Rủi ro & Kiểm định' },
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let Q=[], qi=0, playing=false, spd=1, total=0, done=0, paused=null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init(){
  document.getElementById('hdrTitle').textContent = M.title;
  const al = document.getElementById('agentList');
  Object.entries(A).forEach(([n,c])=>{
    al.innerHTML+=`<div class="agent-card" id="a-${n.replace(/ /g,'-')}">
      <div class="av" style="background:${c.color}1A;color:${c.color}">${c.icon}</div>
      <div><div class="agent-name" style="color:${c.color}">${n}</div>
      <div class="agent-role">${c.tag}</div></div></div>`;
  });
  buildQ(); total=Q.length;
})();

// ─── QUEUE ───────────────────────────────────────────────────────────────────
function buildQ(){
  Q.push({t:'round', n:1, title:'Phát biểu — Mỗi thành viên nêu quan điểm chiến lược'});
  M.round1.forEach(m=>Q.push({t:'msg',...m}));
  Q.push({t:'round', n:2, title:'Tranh luận — Phản biện đa chiều và bảo vệ quan điểm'});
  M.round2.forEach(d=>Q.push({t:'debate',...d}));
  Q.push({t:'round', n:3, title:'Kết luận chiến lược — Đồng thuận, Ma trận & Hành động'});
  Q.push({t:'summary'});
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function mkMsg(item){
  const ag=A[item.agent]||{icon:'👤',color:'#999',tag:''};
  const el=document.createElement('div'); el.className='msg';
  el.innerHTML=`<div class="msg-av" style="background:${ag.color}1A;color:${ag.color}">${ag.icon}</div>
    <div class="msg-body">
      <div class="msg-hdr">
        <span class="msg-name" style="color:${ag.color}">${item.agent}</span>
        ${item.tag?`<span class="msg-tag">${item.tag}</span>`:''}
      </div>
      <div class="msg-txt" id="t${Date.now()}${Math.random()}"></div>
      ${item.insight?`<div class="insight-box"><div class="insight-label">💡 Góc nhìn chiến lược</div>${item.insight}</div>`:''}
    </div>`;
  document.getElementById('msgs').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('vis'));
  return el.querySelector('.msg-txt');
}

function mkDebate(item){
  const el=document.createElement('div'); el.className='debate';
  const exHTML=item.exchanges.map(ex=>{
    const ag=A[ex.agent]||{icon:'👤',color:'#999'};
    return `<div class="exchange">
      <div class="ex-av" style="background:${ag.color}1A;color:${ag.color}">${ag.icon}</div>
      <div><div class="ex-name" style="color:${ag.color}">${ex.agent}</div>
      <div class="ex-txt">${ex.text}</div></div></div>`;
  }).join('');
  el.innerHTML=`<div class="debate-topic">⚡ ${item.topic}</div>
    <div class="debate-body">${exHTML}
    <div class="conclusion"><strong>→ Kết luận:</strong> ${item.conclusion}</div></div>`;
  document.getElementById('msgs').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('vis'));
  scrollB();
}

function mkSummary(){
  const s=M.summary;
  const el=document.createElement('div'); el.className='msg';
  el.innerHTML=`<div class="msg-body" style="width:100%">
    <div class="priority-card">
      <div class="priority-icon">🏆</div>
      <div><div class="priority-label">Khuyến nghị chiến lược #1</div>
      <div class="priority-text">${s.priority}</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <div class="card-title" style="color:#7BC47F">✅ Đồng thuận</div>
        ${s.agreed.map(a=>`<div class="card-item"><span>•</span><span>${a}</span></div>`).join('')}
      </div>
      <div class="card">
        <div class="card-title" style="color:#E89B6B">⚠️ Chủ quyết định</div>
        ${s.disputed.map(d=>`<div class="card-item"><span>•</span><span>${d}</span></div>`).join('')}
      </div>
      <div class="card matrix">
        <div class="card-title" style="color:#6B8FBF">📊 Ma trận ưu tiên (Impact × Effort)</div>
        <div class="matrix-grid">
          ${s.matrix.map(c=>`<div class="m-cell" style="background:${c.bg};border:1px solid ${c.border}">
            <div class="m-label" style="color:${c.color}">${c.label}</div>
            ${c.items.map(i=>`<div class="m-item">• ${i}</div>`).join('')}
          </div>`).join('')}
        </div>
      </div>
    </div>
    <table class="action-tbl">
      <thead><tr><th>#</th><th>Việc cần làm</th><th>Phụ trách</th><th>Deadline</th></tr></thead>
      <tbody>${s.actions.map((a,i)=>`<tr>
        <td style="color:rgba(253,248,237,0.3)">${i+1}</td>
        <td>${a.task}</td>
        <td style="color:${(A[a.owner]||{color:'#999'}).color}">${a.owner}</td>
        <td style="color:rgba(253,248,237,0.45)">${a.deadline}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
  document.getElementById('msgs').appendChild(el);
  requestAnimationFrame(()=>el.classList.add('vis'));
  scrollB();
}

// ─── TYPEWRITER ───────────────────────────────────────────────────────────────
function typewrite(el, text, cb){
  let i=0;
  const cur=document.createElement('span'); cur.className='cur'; el.appendChild(cur);
  function tick(){
    if(!playing){ paused={el,text,i,cb}; return; }
    if(i>=text.length){ cur.remove(); cb(); return; }
    el.insertBefore(document.createTextNode(text[i++]), cur);
    scrollB();
    setTimeout(tick, 16/spd);
  }
  tick();
}

// ─── PLAYBACK ────────────────────────────────────────────────────────────────
function next(){
  if(!playing||qi>=Q.length){
    if(qi>=Q.length) finish();
    return;
  }
  const item=Q[qi++];
  done++;
  document.getElementById('prog').style.width=(done/total*100)+'%';

  if(item.t==='round'){
    setRound(item.n, item.title);
    setTimeout(next, 350/spd);
  } else if(item.t==='msg'){
    setSpeaking(item.agent);
    const txtEl=mkMsg(item);
    typewrite(txtEl, item.text, ()=>{ setSpeaking(null); setTimeout(next, 500/spd); });
  } else if(item.t==='debate'){
    mkDebate(item);
    setTimeout(next, 700/spd);
  } else if(item.t==='summary'){
    mkSummary();
    setTimeout(next, 300/spd);
  }
}

function togglePlay(){
  playing=!playing;
  const btn=document.getElementById('playBtn');
  if(playing){
    btn.textContent='⏸ Tạm dừng';
    setBadge('live');
    if(paused){ const p=paused; paused=null; typewrite(p.el, p.text.slice(p.i), p.cb); }
    else next();
  } else {
    btn.textContent='▶ Tiếp tục';
    setBadge('idle');
  }
}

function skip(){ spd=30; if(!playing){playing=true; document.getElementById('playBtn').textContent='⏸ Tạm dừng'; setBadge('live'); next(); } }
function setSpd(s,el){ spd=s; document.querySelectorAll('.spd-btn').forEach(b=>b.classList.remove('on')); el.classList.add('on'); }
function finish(){ setBadge('done'); const btn=document.getElementById('playBtn'); btn.textContent='✓ Hoàn thành'; btn.disabled=true; }

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function setRound(n,title){
  document.getElementById('rBadge').textContent='ROUND '+n;
  document.getElementById('rBadge').style.cssText=`background:rgba(198,92,51,0.18);color:#C65C33;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;letter-spacing:0.5px`;
  document.getElementById('rTitle').textContent=title;
  ['r1','r2','r3'].forEach((id,i)=>{
    const e=document.getElementById(id);
    e.className='round-item'+(i+1<n?' done':i+1===n?' active':'');
  });
}

function setSpeaking(name){
  document.querySelectorAll('.agent-card').forEach(e=>{e.classList.remove('speaking'); e.classList.add('active');});
  if(name){ const e=document.getElementById('a-'+name.replace(/ /g,'-')); if(e){e.classList.add('speaking'); e.classList.remove('active');} }
}

function setBadge(state){
  const el=document.getElementById('badge');
  if(state==='idle') { el.className='hdr-badge badge-idle'; el.textContent='⏳ Sẵn sàng'; }
  if(state==='live') { el.className='hdr-badge badge-live'; el.textContent='🔴 Đang họp'; }
  if(state==='done') { el.className='hdr-badge badge-done'; el.textContent='✅ Hoàn thành'; }
}

function scrollB(){ const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; }
</script>
</body>
</html>
